name: CI

# Real CI for the RomanBath repo. The impressive quality gate under
# `zeroclaw/.github/` belongs to the upstream ZeroClaw project and only runs
# on that repo's `master` — it never executed here. This workflow gates *this*
# repository: the React frontend and the vendored Rust workspace.

on:
  push:
    branches: [main, 'claude/**', 'codex/**', 'feat/**', 'fix/**']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # ── Frontend: typecheck + lint + unit tests + production build ────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build

  # ── Rust: fmt + clippy (-D warnings) + tests, mirroring upstream's proven
  #    invocation (toolchain, ci-all feature, zeroclaw-desktop exclusion, and
  #    the web/dist embed placeholder the gateway needs to compile). ─────────
  rust:
    name: Rust
    runs-on: ubuntu-latest
    timeout-minutes: 40
    defaults:
      run:
        working-directory: zeroclaw
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: zeroclaw
          cache-on-failure: true
      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y libudev-dev mold
      - name: Ensure web/dist embed placeholder exists
        run: mkdir -p web/dist && touch web/dist/.gitkeep
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: >
          cargo clippy
          --workspace
          --exclude zeroclaw-desktop
          --all-targets
          --features ci-all
          -- -D warnings
      - name: Install cargo-nextest
        run: curl -LsSf https://get.nexte.st/latest/linux | tar zxf - -C ~/.cargo/bin
      - name: Test
        run: cargo nextest run --locked --workspace --exclude zeroclaw-desktop
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C link-arg=-fuse-ld=mold"

  # ── Single required gate for branch protection ───────────────────────────
  gate:
    name: CI Gate
    if: always()
    needs: [frontend, rust]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "::error::One or more CI jobs failed or were cancelled"
            exit 1
          fi
